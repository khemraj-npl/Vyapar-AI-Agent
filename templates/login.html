{% extends "base.html" %}
{% block title %}Sign in — Vyapar AI{% endblock %}
{% block bare %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-xl w-full max-w-sm p-8">
    <h1 class="text-xl font-semibold text-slate-900">Vyapar AI Employee</h1>
    <p class="text-sm text-slate-500 mt-1 mb-6">Business owner dashboard</p>
    {% if error %}
    <div class="mb-4 text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded px-3 py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/dashboard/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input name="email" type="email" required class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input name="password" type="password" required class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded px-3 py-2">Sign in</button>
    </form>
    <p class="text-sm text-slate-500 mt-5 text-center">New here? <a href="/dashboard/signup" class="text-indigo-600 hover:text-indigo-800">Create an account</a></p>
  </div>
</div>
{% endblock %}
