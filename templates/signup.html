{% extends "base.html" %}
{% block title %}Sign up — Vyapar AI{% endblock %}
{% block bare %}
<div class="min-h-screen flex items-center justify-center py-10">
  <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">
    <h1 class="text-xl font-semibold text-slate-900">Create your AI employee</h1>
    <p class="text-sm text-slate-500 mt-1 mb-6">Sign up your business and start in minutes.</p>
    {% if error %}
    <div class="mb-4 text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded px-3 py-2">{{ error }}</div>
    {% endif %}
    <form method="post" action="/dashboard/signup" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Business name</label>
        <input name="business_name" required class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Industry</label>
        <select name="industry" class="w-full border border-slate-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="general">General</option>
          <option value="retail">Retail / Shop</option>
          <option value="restaurant">Restaurant / Food</option>
          <option value="services">Services</option>
          <option value="clinic">Clinic / Health</option>
          <option value="education">Education</option>
          <option value="isp">Internet Service Provider</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input name="email" type="email" required class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input name="password" type="password" required minlength="6" class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded px-3 py-2">Create account</button>
    </form>
    <p class="text-sm text-slate-500 mt-5 text-center">Already have an account? <a href="/dashboard/login" class="text-indigo-600 hover:text-indigo-800">Sign in</a></p>
  </div>
</div>
{% endblock %}
