services:
  - type: web
    name: vyapar-ai-employee
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /healthz
    envVars:
      - key: TELEGRAM_MODE
        value: webhook
      - key: PORT
        value: 10000
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_STORE
        value: false
    autoDeploy: true
